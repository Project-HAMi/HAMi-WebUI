syntax = "proto3";
package kratos.api;

option go_package = "vgpu/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Prometheus prometheus = 2;
  map<string, string> node_selectors = 3;
  int32 exporter_concurrency_limit = 5;
  string metrics_generate_interval = 6;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Prometheus {
  string address = 1;
  string timeout = 2;
  string auth = 3;
}
